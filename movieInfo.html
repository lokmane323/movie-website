<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DzShow</title>
    <link rel="stylesheet" href="./css/shared/general.css">
    <link rel="stylesheet" href="./css/shared/header.css">
    <link rel="stylesheet" href="./css/pages/movieInfo.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gabriela&family=Grandstander:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
      .player-wrapper {
        width: 90%;
        margin: 20px auto;
        aspect-ratio: 16/9;
        background: #000;
        border-radius: 12px;
        overflow: hidden;
      }
      .player-wrapper iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
      .hide { display: none !important; }
    </style>
</head>
<body>
    <header>
      <a href="index.html" class="logo">
          <i class='bx bxs-movie'></i><span>D</span>zShow
      </a>
      <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search for a movie...">
        <button type="submit" class="search-btn">Search</button>
      </div>
      <div class="img-menu" id="menu-icon">
        <img src="imgs/dashboard.png" alt="Menu">
      </div>
      <ul class="navbar">
          <li><a href="index.html" class="home-active">Home</a></li>
          <li><a href="index.html">Movies</a></li>
      </ul>
    </header>

  <div class="container"></div>

  <!-- مشغل الفيلم -->
  <div class="player-wrapper">
    <iframe id="moviePlayer" src="" allowfullscreen
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
    </iframe>
  </div>

<script src="js/movieInfo.js" type="module"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const movieId = params.get('id');
  if (movieId) {
    document.getElementById('moviePlayer').src =
      `https://vidsrc.to/embed/movie/${movieId}`;
  }
</script>
</body>
</html>
